<!DOCTYPE html>
<html>
<head>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAvTAL-alQoQzHmnFxuO1QGTy7jvcJXyOg&libraries=places,geometry"></script>
  <script>
    // Search nearby fuel stations using Places API
    function searchNearbyStations(lat, lng) {
      return new Promise((resolve, reject) => {
        const map = new google.maps.Map(document.createElement('div'));
        const service = new google.maps.places.PlacesService(map);
        service.nearbySearch({
          location: new google.maps.LatLng(lat, lng),
          radius: 10000,
          type: 'gas_station',
        }, (results, status) => {
          if (status === google.maps.places.PlacesServiceStatus.OK && results) {
            const stations = results.map(place => ({
              name: place.name || 'Fuel Station',
              address: place.vicinity || '',
              lat: place.geometry.location.lat(),
              lng: place.geometry.location.lng(),
              rating: place.rating || 0,
              placeId: place.place_id || '',
              isOpen: place.opening_hours ? place.opening_hours.open_now : null,
            }));
            resolve(stations);
          } else {
            reject(status);
          }
        });
      });
    }

    // Geocode a search query to coordinates
    function geocodeAddress(address) {
      return new Promise((resolve, reject) => {
        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ address: address }, (results, status) => {
          if (status === 'OK' && results.length > 0) {
            resolve({
              lat: results[0].geometry.location.lat(),
              lng: results[0].geometry.location.lng(),
              formattedAddress: results[0].formatted_address,
            });
          } else {
            reject(status);
          }
        });
      });
    }
  </script>
