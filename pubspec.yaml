name: petromind
description: PetroMind - Fuel price tracking app for Sri Lanka
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1
  google_maps_flutter: ^2.9.0
  geolocator: ^14.0.2
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  http: ^1.6.0
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  url_launcher: ^6.3.0
  google_fonts: ^8.1.0
  geocoding: ^4.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
 