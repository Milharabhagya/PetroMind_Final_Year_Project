name: petromind
description: PetroMind - Smart Fuel App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  provider: ^6.1.2
  google_maps_flutter: ^2.6.0
  geolocator: ^12.0.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.0
  http: ^1.2.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.0.0
  google_fonts: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/station_icons/
    - assets/animations/
